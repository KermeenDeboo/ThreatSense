<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreatSense | Terminal Access</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { 
      darkMode: 'class', 
      theme: { 
        extend: { 
          fontFamily: { sans: ['Space Grotesk'] }, 
          colors: { 
            primary: '#6366f1', 
            lightbg: '#e0f2fe',  
            darkbg: '#212f65', 
            navycard: '#2a3b7a' 
          }
        } 
      }
    }
  </script>
  <style>
    .avatar-option { border: 2px solid transparent; transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .avatar-option.selected { border-color: #6366f1; transform: scale(1.15); background: rgba(99, 102, 241, 0.1); border-radius: 1rem; }
  </style>
</head>

<body class="bg-lightbg dark:bg-darkbg text-slate-900 dark:text-white transition-colors duration-500 overflow-x-hidden">

<div id="canvas-container"></div>

<header class="sticky top-0 z-50 backdrop-blur-md bg-white/30 dark:bg-darkbg/80 border-b border-indigo-200 dark:border-white/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center text-slate-900 dark:text-white">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center text-white font-bold shadow-lg text-xs">TS</div>
      <span class="font-bold text-xl tracking-tighter uppercase">ThreatSense</span>
    </div>
    <nav id="navLinks" class="flex gap-6 items-center text-xs font-bold uppercase tracking-widest">
        </nav>
  </div>
</header>

<main class="min-h-screen flex items-center justify-center px-6 py-20">
  
  <div id="authCard" class="w-full max-w-2xl reveal bg-white/40 dark:bg-black/20 backdrop-blur-xl border border-indigo-200 dark:border-white/10 p-8 md:p-12 rounded-[3rem] shadow-2xl relative">
    
    <div id="notification" class="hidden absolute top-[-20px] left-1/2 -translate-x-1/2 w-full max-w-sm bg-green-500 text-white text-center py-3 rounded-2xl shadow-xl z-50 font-bold text-sm">
      ✅ Account Created! Please Login.
    </div>

    <div class="text-center mb-8">
      <div id="avatarDisplay" class="inline-flex w-24 h-24 bg-white/20 dark:bg-primary/20 rounded-full items-center justify-center mb-4 shadow-xl border-4 border-primary/30 text-5xl">
        🛡️
      </div>
      <h2 id="formTitle" class="text-3xl font-black uppercase tracking-tighter">System Login</h2>
      <p id="formSubtitle" class="text-[10px] opacity-60 uppercase tracking-[0.2em] font-bold mt-2">Login To Access the system</p>
    </div>

    <form id="authForm" class="space-y-6">
      
      <div id="avatarSection" class="space-y-3 mb-8 hidden">
        <label class="text-[10px] font-black uppercase tracking-widest opacity-50 text-primary text-center block">Select Your Identity Profile</label>
        <div class="flex justify-center gap-5 py-2">
          <div onclick="selectAvatar('👨‍💼', this)" class="avatar-option p-3 text-3xl selected">👨‍💼</div>
          <div onclick="selectAvatar('👩‍💼', this)" class="avatar-option p-3 text-3xl">👩‍💼</div>
          <div onclick="selectAvatar('🕵️', this)" class="avatar-option p-3 text-3xl">🕵️</div>
          <div onclick="selectAvatar('👨‍💻', this)" class="avatar-option p-3 text-3xl">👨‍💻</div>
          <div onclick="selectAvatar('👩‍💻', this)" class="avatar-option p-3 text-3xl">👩‍💻</div>
        </div>
      </div>

      <div id="signupFields" class="space-y-6 hidden">
        <div class="grid md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[10px] font-black uppercase tracking-widest opacity-50 ml-4 text-primary">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter name" class="w-full px-5 py-4 bg-white/50 dark:bg-white/5 border border-indigo-100 dark:border-white/10 rounded-2xl focus:outline-none focus:border-primary transition-all">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-black uppercase tracking-widest opacity-50 ml-4 text-primary">Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" class="w-full px-5 py-4 bg-white/50 dark:bg-white/5 border border-indigo-100 dark:border-white/10 rounded-2xl focus:outline-none focus:border-primary transition-all">
          </div>
        </div>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[10px] font-black uppercase tracking-widest opacity-50 ml-4 text-primary">City</label>
            <input type="text" id="city" placeholder="e.g. Mumbai" class="w-full px-5 py-4 bg-white/50 dark:bg-white/5 border border-indigo-100 dark:border-white/10 rounded-2xl focus:outline-none focus:border-primary transition-all">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-black uppercase tracking-widest opacity-50 ml-4 text-primary">Gender</label>
            <select id="gender" class="w-full px-5 py-4 bg-white/50 dark:bg-white/5 border border-indigo-100 dark:border-white/10 rounded-2xl focus:outline-none focus:border-primary transition-all appearance-none dark:text-white">
              <option value="" disabled selected class="bg-lightbg dark:bg-darkbg text-slate-900 dark:text-white">Select</option>
              <option value="male" class="bg-lightbg dark:bg-darkbg text-slate-900 dark:text-white">Male</option>
              <option value="female" class="bg-lightbg dark:bg-darkbg text-slate-900 dark:text-white">Female</option>
              <option value="other" class="bg-lightbg dark:bg-darkbg text-slate-900 dark:text-white">Other</option>
            </select>
          </div>
        </div>
      </div>

      <div class="space-y-6">
        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-widest opacity-50 ml-4 text-primary">User Name</label>
          <input type="text" id="username" placeholder="Enter your username" required 
            class="w-full px-5 py-4 bg-white/50 dark:bg-white/5 border border-indigo-100 dark:border-white/10 rounded-2xl focus:outline-none focus:border-primary transition-all text-slate-900 dark:text-white">
        </div>
        
        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-widest opacity-50 ml-4 text-primary">Password</label>
          <input type="password" id="password" placeholder="••••••••" required 
            class="w-full px-5 py-4 bg-white/50 dark:bg-white/5 border border-indigo-100 dark:border-white/10 rounded-2xl focus:outline-none focus:border-primary transition-all text-slate-900 dark:text-white">
        </div>

        <div id="confirmPassField" class="space-y-2 hidden">
          <label class="text-[10px] font-black uppercase tracking-widest opacity-50 ml-4 text-primary">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" class="w-full px-5 py-4 bg-white/50 dark:bg-white/5 border border-indigo-100 dark:border-white/10 rounded-2xl focus:outline-none focus:border-primary transition-all">
        </div>
      </div>

      <button type="submit" id="submitBtn" class="w-full py-5 bg-primary text-white font-black uppercase tracking-widest rounded-2xl shadow-xl hover:shadow-primary/40 hover:scale-[1.01] transition-all">
        Go To Dashboard
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-xs opacity-60">
        <span id="toggleText">New user?</span>
        <button onclick="toggleAuthMode()" id="toggleBtn" class="text-primary font-bold hover:underline ml-1">Register here</button>
      </p>
    </div>
  </div>

</main>

<footer></footer>

<script src="../main.js"></script>

<script>
  // Initial state set to Login Mode based on your request
  let isLoginMode = true; 
  let selectedAvatar = '🛡️';

  // Immediately set the UI to Login Mode on load
  window.addEventListener('DOMContentLoaded', () => {
      if(isLoginMode) {
          // Force UI to login state
          document.getElementById('signupFields').classList.add('hidden');
          document.getElementById('avatarSection').classList.add('hidden');
          document.getElementById('confirmPassField').classList.add('hidden');
          document.getElementById('formTitle').innerText = "System Login";
          document.getElementById('submitBtn').innerText = "Login to Dashboard";
          document.getElementById('toggleText').innerText = "New user?";
          document.getElementById('toggleBtn').innerText = "Register here";
      }
  });

  function selectAvatar(emoji, el) {
    selectedAvatar = emoji;
    document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('avatarDisplay').innerText = emoji;
  }

  function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    const signupFields = document.getElementById('signupFields');
    const avatarSection = document.getElementById('avatarSection');
    const confirmPassField = document.getElementById('confirmPassField');
    const submitBtn = document.getElementById('submitBtn');
    const formTitle = document.getElementById('formTitle');
    const toggleText = document.getElementById('toggleText');
    const toggleBtn = document.getElementById('toggleBtn');

    if (isLoginMode) {
      signupFields.classList.add('hidden');
      avatarSection.classList.add('hidden');
      confirmPassField.classList.add('hidden');
      formTitle.innerText = "System Login";
      submitBtn.innerText = "Login to Dashboard";
      toggleText.innerText = "New user?";
      toggleBtn.innerText = "Register here";
    } else {
      signupFields.classList.remove('hidden');
      avatarSection.classList.remove('hidden');
      confirmPassField.classList.remove('hidden');
      formTitle.innerText = "Security Enrollment";
      submitBtn.innerText = "Create Secure Account";
      toggleText.innerText = "Already registered?";
      toggleBtn.innerText = "Login here";
    }
  }

  document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if (!isLoginMode) {
        const confirmPass = document.getElementById('confirmPassword').value;
        if(pass !== confirmPass) {
            alert("CRITICAL ERROR: Passwords do not match.");
            return;
        }

        const userData = {
            name: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            city: document.getElementById('city').value,
            gender: document.getElementById('gender').value,
            avatar: selectedAvatar,
            username: user,
            password: pass
        };

        try {
            const res = await fetch('http://127.0.0.1:5000/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });
            const data = await res.json();
            if(res.status === 201){
                const notify = document.getElementById('notification');
                notify.innerText = "✅ Account Created! Please Login.";
                notify.classList.remove('hidden');
                setTimeout(() => { notify.classList.add('hidden'); toggleAuthMode(); }, 2000);
            } else {
                alert(data.message);
            }
        } catch(err) {
            console.error(err);
            alert("Server error. Try again later.");
        }
} else {
    // Login
    try {
        const res = await fetch('http://127.0.0.1:5000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({username: user, password: pass})
        });
        const data = await res.json();
        console.log(data);
        if(res.status === 200){
            const userRole = data.role || 'user'; // get role from backend
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', data.username);
            localStorage.setItem('avatar', data.avatar || '🛡️');
            localStorage.setItem('role', userRole); // store role

            document.getElementById('submitBtn').innerText = "Verifying Credentials...";

            setTimeout(() => {
                if(userRole === 'admin'){
                    window.location.href = 'adminDashboard.html'; // redirect admins
                } else {
                    window.location.href = 'dashboard.html';       // redirect normal users
                }
            }, 1000);
        } else {
            alert(data.message);
        }
    } catch(err) {
        console.error(err);
        alert("Server error. Try again later.");
    }
}
});

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
  });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
