<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>ThreatSense | Entry</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  
  <script>
    tailwind.config = { 
      darkMode: 'class', 
      theme: { 
        extend: { 
          colors: { 
            primary: '#4f46e5', 
            accent: '#8b5cf6', 
            darkbg: '#0f172a' 
          }
        }
      }
    }
  </script>
</head>

<body class="bg-darkbg text-white font-sans overflow-hidden">
  <div class="orb w-96 h-96 bg-primary top-1/4 left-1/4 absolute rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
  
  <main class="h-screen flex flex-col items-center justify-center text-center px-6 relative z-10">
    
    <div class="mb-8 flex items-center justify-center">
      <img src="logo.png" alt="ThreatSense Logo" class="w-32 md:w-48 h-auto drop-shadow-2xl">
    </div>
    
    <p class="text-accent font-mono text-sm md:text-base tracking-[0.3em] uppercase mb-2 animate-pulse">
      Welcome to
    </p>
    
    <h1 class="text-6xl font-black mb-4 tracking-tighter">THREATSENSE</h1>
    <p class="text-slate-400 max-w-md mb-10">Autonomous Cyber Threat Prediction & Self-Healing Defense System.</p>
    
    <a href="home.html" class="px-12 py-4 bg-white text-darkbg rounded-full font-black uppercase tracking-widest hover:bg-primary hover:text-white transition-all duration-300">
      Enter Terminal
    </a>
  </main>

  <footer></footer>

  <script src="main.js"></script>
</body>
</html>
